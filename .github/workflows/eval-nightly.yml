name: Eval Nightly

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch:

jobs:
  eval-full:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install python-multipart pytest httpx

      - name: Generate DAU dataset
        run: python data/generate_data.py

      - name: Run fast offline evals + baseline check
        run: python evals/compare_baseline.py

      - name: Run full DAU eval with LLM narrative
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            python evals/analyze_eval.py
          else
            echo "ANTHROPIC_API_KEY not set — skipping LLM narrative eval"
          fi

      - name: Run slow relevancy tests
        env:
          SECRET_KEY: test-secret-key-that-is-long-enough-for-hs256
        run: python -m pytest tests/test_eval_tools.py -m slow -q --tb=short
