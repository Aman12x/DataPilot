name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python dependency consistency
        run: python -m pip check

      - name: Run tests
        env:
          SECRET_KEY: test-secret-key-that-is-long-enough-for-hs256
          PYTHONUNBUFFERED: "1"
        run: python -m pytest tests/ -q -m "not integration" --tb=short --disable-warnings

      - name: Compile backend modules
        run: python -m compileall backend agents auth config memory tools -q

  integration-services:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: datapilot_test
          POSTGRES_USER: datapilot
          POSTGRES_PASSWORD: datapilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U datapilot -d datapilot_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check Python dependency consistency
        run: python -m pip check

      - name: Run Redis/Postgres integration tests
        env:
          SECRET_KEY: test-secret-key-that-is-long-enough-for-hs256
          PYTHONUNBUFFERED: "1"
          REDIS_URL: redis://127.0.0.1:6379/0
          DATAPILOT_POSTGRES_INTEGRATION: "1"
          PGHOST: 127.0.0.1
          PGPORT: "5432"
          PGDATABASE: datapilot_test
          PGUSER: datapilot
          PGPASSWORD: datapilot
        run: python -m pytest tests/ -q -m integration --tb=short --disable-warnings

  eval-offline:
    runs-on: ubuntu-latest
    needs: [test-backend]
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            backend/requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate DAU dataset
        run: python data/generate_data.py

      - name: Run offline evals against baseline
        run: python evals/compare_baseline.py

  build-frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Node 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Build
        working-directory: frontend
        env:
          VITE_API_URL: https://placeholder.example.com
        run: npm run build

      - name: TypeScript check
        working-directory: frontend
        run: ./node_modules/.bin/tsc --noEmit

  e2e:
    runs-on: ubuntu-latest
    needs: [test-backend, build-frontend]
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Python 3.11
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            backend/requirements.txt

      - name: Set up Node 22
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit frontend dependencies
        working-directory: frontend
        run: npm audit --audit-level=high

      - name: Install Playwright browsers
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        working-directory: frontend
        env:
          CI: "true"
          PYTHON: python
          SECRET_KEY: e2e-test-secret-key-for-playwright
          ENV: development
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          retention-days: 7
